<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Dress Inventory</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF8F5;--surface:#FFF;--surface-alt:#F5F0EB;
  --border:#E8E0D8;--border-light:#F0EBE5;
  --text:#2C2420;--text-mid:#6B5D52;--text-light:#A89888;
  --accent:#C4956A;--accent-hover:#B5845A;--accent-light:#F5EDE5;
  --danger:#D4644A;--danger-light:#FDF0ED;
  --success:#5A9A6A;--soldout:#E8524A;
  --shadow-md:0 4px 12px rgba(44,36,32,0.08);
  --shadow-lg:0 8px 30px rgba(44,36,32,0.12);
  --radius:14px;--radius-sm:10px;
  --font-body:'DM Sans',sans-serif;--font-display:'Playfair Display',serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  overflow-x:hidden;-webkit-text-size-adjust:100%}
.app{max-width:430px;margin:0 auto;padding:16px 16px 100px}

/* Header - stacked for mobile */
.header{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.header-left h1{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-0.5px}
.header-left p{font-size:13px;color:var(--text-light);margin-top:2px}
.header-actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}

/* Stats - 3 columns */
.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px 12px;text-align:center}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-light);font-weight:500}
.stat-value{font-family:var(--font-display);font-size:24px;font-weight:600;margin-top:2px}

/* Toolbar - stacked */
.toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.search-box{width:100%;position:relative}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-light)}
.search-box input{width:100%;padding:14px 14px 14px 42px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:16px;background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none}
.search-box input:focus{border-color:var(--accent)}
.filter-select{width:100%;padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:16px;background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%23A89888' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M19 9l-7 7-7-7' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center}

/* Buttons - larger tap targets */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:12px 14px;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;min-height:44px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent-hover)}
.btn-outline{background:var(--surface);color:var(--text-mid);border:1px solid var(--border)}
.btn-outline:active{background:var(--surface-alt)}
.btn-small{padding:8px 12px;font-size:12px;min-height:36px}
.btn-icon{padding:10px;background:none;border:1px solid transparent;color:var(--text-light);border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;-webkit-tap-highlight-color:transparent}
.btn-icon:active{background:var(--surface-alt)}
.btn-icon.danger:active{background:var(--danger-light);color:var(--danger)}

/* Cards */
.dress-grid{display:flex;flex-direction:column;gap:10px}
.dress-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden}
.dress-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;gap:8px}
.dress-card-header:active{background:var(--surface-alt)}
.dress-info{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.dress-code{font-size:13px;font-weight:700;background:var(--surface-alt);color:var(--accent);padding:4px 10px;border-radius:8px;letter-spacing:0.5px;flex-shrink:0}
.dress-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dress-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.dress-price{font-family:var(--font-display);font-weight:600;font-size:17px;margin-right:4px}
.variant-dots{display:flex;gap:3px}
.variant-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border)}
.variant-dot.soldout{position:relative}
.variant-dot.soldout::after{content:'';position:absolute;top:50%;left:-1px;right:-1px;height:1.5px;background:var(--soldout);transform:rotate(-45deg)}
.expand-arrow{transition:transform 0.2s;color:var(--text-light)}
.expand-arrow.open{transform:rotate(180deg)}
.card-actions{display:flex;gap:0}

/* Variant grid - 2 columns on phone */
.dress-card-body{border-top:1px solid var(--border-light);padding:14px}
.variants-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.variant-card{border:1px solid var(--border-light);border-radius:var(--radius-sm);overflow:hidden}
.variant-card.soldout-card{opacity:0.6}
.variant-image-box{aspect-ratio:3/4;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.variant-image-box img{width:100%;height:100%;object-fit:cover}
.soldout-badge{position:absolute;top:8px;right:8px;background:var(--soldout);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}
.variant-details{padding:10px 10px}
.variant-color-name{font-weight:600;font-size:13px;text-transform:capitalize;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.color-swatch{width:10px;height:10px;border-radius:50%;border:1px solid var(--border)}
.variant-sizes{display:flex;flex-wrap:wrap;gap:4px}
.size-tag{font-size:11px;background:var(--surface-alt);color:var(--text-mid);padding:3px 7px;border-radius:4px;font-weight:500}

/* Modal - full screen on mobile */
.modal-overlay{position:fixed;inset:0;background:rgba(44,36,32,0.4);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:430px;box-shadow:var(--shadow-lg);animation:slideUp 0.25s ease;max-height:95vh;display:flex;flex-direction:column}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border-light);flex-shrink:0}
.modal-header h2{font-family:var(--font-display);font-size:20px;font-weight:600}
.modal-body{padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;padding-bottom:calc(16px + env(safe-area-inset-bottom))}

/* Form - stacked on mobile */
.form-row{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.form-group{flex:1}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:16px;color:var(--text);outline:none;background:var(--surface);-webkit-appearance:none}
.form-group input:focus{border-color:var(--accent)}

/* Variant form */
.variant-block{border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px;background:var(--bg)}
.variant-form-row{display:flex;flex-direction:column;gap:12px}
.variant-form-content{flex:1}
.variant-image-upload{width:100%;height:120px;border:2px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;-webkit-tap-highlight-color:transparent}
.variant-image-upload:active{border-color:var(--accent)}
.variant-image-upload img{width:100%;height:100%;object-fit:cover}

/* Color picker - bigger tap targets */
.color-picker-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;margin-bottom:8px}
.color-pick-btn{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.color-pick-btn.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);transform:scale(1.1)}

/* Size checkboxes - bigger for touch */
.size-checkboxes{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.size-checkbox{position:relative}
.size-checkbox input{position:absolute;opacity:0;width:0;height:0}
.size-checkbox label{display:flex;align-items:center;justify-content:center;width:44px;height:38px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-weight:500;color:var(--text-mid);cursor:pointer;background:var(--surface);-webkit-tap-highlight-color:transparent}
.size-checkbox input:checked+label{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Toggle */
.soldout-toggle{display:flex;align-items:center;gap:10px;margin-top:12px;padding:8px 0}
.toggle-switch{width:44px;height:24px;border-radius:12px;background:var(--border);cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.toggle-switch.active{background:var(--soldout)}
.toggle-switch::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform 0.2s}
.toggle-switch.active::after{transform:translateX(20px)}
.soldout-toggle span{font-size:14px;color:var(--text-mid);font-weight:500}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state h3{font-family:var(--font-display);font-size:20px;color:var(--text-mid);margin-bottom:8px}
.empty-state p{font-size:14px}

/* Image preview */
.image-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.image-preview-overlay img{max-width:100%;max-height:85vh;border-radius:var(--radius);object-fit:contain}

/* Color manager */
.color-manager-list{display:flex;flex-direction:column;gap:8px;max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.color-manager-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--bg)}
.color-manager-swatch{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;position:relative;overflow:hidden}
.color-manager-swatch input[type="color"]{position:absolute;inset:-10px;width:56px;height:56px;border:none;cursor:pointer;opacity:0}
.color-manager-name{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:16px;outline:none;background:var(--surface)}
.add-color-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:2px dashed var(--border);border-radius:var(--radius-sm);margin-top:10px}
.add-color-row input[type="text"]{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:16px;outline:none;background:var(--surface)}

/* Toast */
.toast{position:fixed;bottom:calc(30px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;z-index:3000;animation:toastIn 0.3s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
// ═══════════════════════════════════════
// Dress Inventory - Standalone App
// ═══════════════════════════════════════

const PRESET_SIZES = ["36","38","40","42","44","46","48","50","52","54","56"];
const LIGHT_COLORS = ["#F5F5F5","#FFFDD0","#FFFFF0","#FFDAB9","#98FB98","#C0C0C0","#F1C40F","#40E0D0"];

const DEFAULT_COLORS = [
  {name:"Black",hex:"#1A1A1A"},{name:"White",hex:"#F5F5F5"},{name:"Navy",hex:"#1B2A4A"},
  {name:"Beige",hex:"#D4B896"},{name:"Mauve",hex:"#9B7B8E"},{name:"Red",hex:"#C0392B"},
  {name:"Burgundy",hex:"#800020"},{name:"Pink",hex:"#E8A0BF"},{name:"Rose",hex:"#E8A0B4"},
  {name:"Coral",hex:"#FF7F50"},{name:"Blue",hex:"#2E86C1"},{name:"Teal",hex:"#008080"},
  {name:"Green",hex:"#27AE60"},{name:"Olive",hex:"#808000"},{name:"Brown",hex:"#795548"},
  {name:"Camel",hex:"#C19A6B"},{name:"Cream",hex:"#FFFDD0"},{name:"Nude",hex:"#E3BC9A"},
  {name:"Gray",hex:"#7F8C8D"},{name:"Silver",hex:"#C0C0C0"},{name:"Gold",hex:"#D4A84B"},
  {name:"Lavender",hex:"#B57EDC"},{name:"Purple",hex:"#7B2D8E"},{name:"Orange",hex:"#E67E22"},
  {name:"Yellow",hex:"#F1C40F"},{name:"Khaki",hex:"#C3B091"},{name:"Peach",hex:"#FFDAB9"},
  {name:"Mint",hex:"#98FB98"},{name:"Turquoise",hex:"#40E0D0"},{name:"Maroon",hex:"#800000"},
  {name:"Dusty Rose",hex:"#DCAE96"},{name:"Ivory",hex:"#FFFFF0"}
];

// State
let dresses = JSON.parse(localStorage.getItem('dress-inv-dresses') || '[]');
let colors = JSON.parse(localStorage.getItem('dress-inv-colors') || 'null') || DEFAULT_COLORS;
let expandedCards = {};
let searchQuery = '';
let filterMode = 'all';
let previewImage = null;

// Modal state
let showDressModal = false;
let showColorModal = false;
let editingIndex = null;
let formId = '', formName = '', formPrice = '';
let formVariants = [newVariant()];

// Color modal state
let editColors = [];
let newColorName = '', newColorHex = '#C4956A';

function newVariant() { return {color:'',colorHex:'#C4956A',sizes:'',soldOut:false,image:null}; }

function save() {
  localStorage.setItem('dress-inv-dresses', JSON.stringify(dresses));
  localStorage.setItem('dress-inv-colors', JSON.stringify(colors));
}

function getColorHex(name) {
  const f = colors.find(c => c.name.toLowerCase() === name.toLowerCase().trim());
  return f ? f.hex : '#C4956A';
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── SVG Icons ──
const ICO = {
  plus: '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>',
  trash: '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  edit: '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  search: '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>',
  img: '<svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" opacity="0.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>',
  close: '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>',
  expand: '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  palette: '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-1 0-.83.67-1.5 1.5-1.5H16c3.31 0 6-2.69 6-6 0-4.96-4.48-9-10-9z" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  download: '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="7 10 12 15 17 10" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="15" x2="12" y2="3" stroke-linecap="round"/></svg>',
  upload: '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17 8 12 3 7 8" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="3" x2="12" y2="15" stroke-linecap="round"/></svg>',
  check: '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  checkDark: '<svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#2C2420" stroke-width="3"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
};

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

// ── Export / Import ──
function exportData() {
  const data = JSON.stringify({dresses, colors, exportedAt: new Date().toISOString()});
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'dress-inventory-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('File saved!');
}

function triggerImport() { document.getElementById('import-input').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (parsed.dresses && Array.isArray(parsed.dresses)) dresses = parsed.dresses;
      if (parsed.colors && Array.isArray(parsed.colors) && parsed.colors.length) colors = parsed.colors;
      save();
      render();
      showToast('Loaded ' + dresses.length + ' dresses!');
    } catch(err) {
      showToast('Error: Invalid file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Filtering ──
function getFiltered() {
  return dresses.filter(d => {
    const q = searchQuery.toLowerCase();
    const match = !q || d.id.toLowerCase().includes(q) || (d.name||'').toLowerCase().includes(q) || d.variants.some(v => v.color.toLowerCase().includes(q));
    if (!match) return false;
    if (filterMode === 'instock') return d.variants.some(v => !v.soldOut);
    if (filterMode === 'soldout') return d.variants.every(v => v.soldOut);
    return true;
  });
}

// ── Image handling ──
function handleVariantImage(vi) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      formVariants[vi].image = ev.target.result;
      render();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ── Render ──
function render() {
  // Save scroll positions before re-render
  const pageScrollY = window.scrollY;
  const modalBody = document.querySelector('.modal-body');
  const modalScrollY = modalBody ? modalBody.scrollTop : 0;
  // Save focused element info
  const activeEl = document.activeElement;
  const activeId = activeEl ? activeEl.id : null;
  const activeSel = activeEl ? activeEl.selectionStart : null;

  const filtered = getFiltered();
  const totalStyles = dresses.length;
  const totalVariants = dresses.reduce((s,d) => s + d.variants.length, 0);
  const soldOut = dresses.reduce((s,d) => s + d.variants.filter(v => v.soldOut).length, 0);
  const inStock = totalVariants - soldOut;

  let html = `
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)">
    <div class="header">
      <div class="header-left">
        <h1>Dress Inventory</h1>
        <p>${totalStyles} styles · ${totalVariants} variants</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline btn-small" onclick="triggerImport()">${ICO.upload} Import</button>
        <button class="btn btn-outline btn-small" onclick="exportData()">${ICO.download} Save</button>
        <button class="btn btn-outline btn-small" onclick="openColorModal()">${ICO.palette} Colors</button>
        <button class="btn btn-primary" onclick="openAddModal()">${ICO.plus} Add</button>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-label">Styles</div><div class="stat-value">${totalStyles}</div></div>
      <div class="stat-card"><div class="stat-label">In Stock</div><div class="stat-value" style="color:var(--success)">${inStock}</div></div>
      <div class="stat-card"><div class="stat-label">Sold Out</div><div class="stat-value" style="color:var(--soldout)">${soldOut}</div></div>
    </div>
    <div class="toolbar">
      <div class="search-box">${ICO.search}<input id="search-input" placeholder="Search..." value="${esc(searchQuery)}" oninput="searchQuery=this.value;render()"></div>
      <select class="filter-select" onchange="filterMode=this.value;render()">
        <option value="all"${filterMode==='all'?' selected':''}>All</option>
        <option value="instock"${filterMode==='instock'?' selected':''}>In Stock</option>
        <option value="soldout"${filterMode==='soldout'?' selected':''}>Sold Out</option>
      </select>
    </div>`;

  if (filtered.length === 0) {
    html += `<div class="empty-state"><h3>${dresses.length===0?'No dresses yet':'No results'}</h3><p>${dresses.length===0?'Add your first dress':'Try different search'}</p></div>`;
  } else {
    html += '<div class="dress-grid">';
    filtered.forEach((dress, fi) => {
      const key = dress.id + dress.createdAt;
      const isOpen = expandedCards[key];
      const realIdx = dresses.indexOf(dress);
      const dots = dress.variants.map(v => {
        const hex = v.colorHex || getColorHex(v.color);
        return `<div class="variant-dot${v.soldOut?' soldout':''}" style="background:${hex};border-color:${hex}" title="${esc(v.color)}"></div>`;
      }).join('');

      html += `<div class="dress-card">
        <div class="dress-card-header" onclick="toggleCard('${key}')">
          <div class="dress-info"><span class="dress-code">${esc(dress.id)}</span>${dress.name?`<span class="dress-name">${esc(dress.name)}</span>`:''}</div>
          <div class="dress-meta">
            <div class="variant-dots">${dots}</div>
            <span class="dress-price">${dress.price} JOD</span>
            <div class="card-actions">
              <button class="btn-icon" onclick="event.stopPropagation();openEditModal(${realIdx})">${ICO.edit}</button>
              <button class="btn-icon danger" onclick="event.stopPropagation();deleteDress(${realIdx})">${ICO.trash}</button>
            </div>
            <span class="expand-arrow${isOpen?' open':''}">${ICO.expand}</span>
          </div>
        </div>`;

      if (isOpen) {
        html += '<div class="dress-card-body"><div class="variants-grid">';
        dress.variants.forEach(v => {
          const sizes = (v.sizes||'').split(',').map(s=>s.trim()).filter(Boolean);
          const hex = v.colorHex || getColorHex(v.color);
          html += `<div class="variant-card${v.soldOut?' soldout-card':''}">
            <div class="variant-image-box"${v.image?` onclick="previewImage='${v.image.substring(0,50)}';showPreview('${v.image.length}')" style="cursor:pointer"`:''}>
              ${v.image?`<img src="${v.image}" alt="${esc(v.color)}">`:ICO.img}
              ${v.soldOut?'<span class="soldout-badge">Sold Out</span>':''}
            </div>
            <div class="variant-details">
              <div class="variant-color-name"><span class="color-swatch" style="background:${hex}"></span>${esc(v.color)}</div>
              ${sizes.length>0 && !v.soldOut ? '<div class="variant-sizes">'+sizes.map(s=>`<span class="size-tag">${s}</span>`).join('')+'</div>' : ''}
            </div>
          </div>`;
        });
        html += '</div></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // ── Dress Modal ──
  if (showDressModal) {
    html += `<div class="modal-overlay" onclick="closeDressModal()"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h2>${editingIndex!==null?'Edit Dress':'Add New Dress'}</h2><button class="btn-icon" onclick="closeDressModal()">${ICO.close}</button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>Code *</label><input id="f-id" value="${esc(formId)}" placeholder="e.g. 001" oninput="formId=this.value"></div>
          <div class="form-group"><label>Name</label><input id="f-name" value="${esc(formName)}" placeholder="Optional" oninput="formName=this.value"></div>
          <div class="form-group" style="max-width:110px"><label>Price *</label><input id="f-price" type="number" value="${esc(formPrice)}" placeholder="140" oninput="formPrice=this.value"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <label style="font-size:11px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.5px">Color Variants</label>
          <button class="btn btn-outline btn-small" onclick="formVariants.push(newVariant());render()">${ICO.plus} Add Color</button>
        </div>`;

    formVariants.forEach((v, vi) => {
      const colorGrid = colors.map((c,ci) => {
        const sel = v.color.toLowerCase() === c.name.toLowerCase();
        const isLight = LIGHT_COLORS.includes(c.hex);
        return `<button class="color-pick-btn${sel?' selected':''}" style="background:${c.hex}${isLight && !sel ? ';border:2px solid var(--border)':''}" onclick="selectColor(${vi},${ci})" title="${esc(c.name)}">${sel?(isLight?ICO.checkDark:ICO.check):''}</button>`;
      }).join('');

      const sizeChecks = PRESET_SIZES.map(s => {
        const arr = (v.sizes||'').split(',').map(x=>x.trim()).filter(Boolean);
        const checked = arr.includes(s);
        return `<div class="size-checkbox"><input type="checkbox" id="sz${vi}-${s}"${checked?' checked':''} onchange="toggleSize(${vi},'${s}')"><label for="sz${vi}-${s}">${s}</label></div>`;
      }).join('');

      html += `<div class="variant-block"><div class="variant-form-row">
        <div class="variant-image-upload" onclick="handleVariantImage(${vi})">
          ${v.image?`<img src="${v.image}">`:ICO.img}
        </div>
        <div class="variant-form-content">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <label style="font-size:11px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:0.5px">Color</label>
            ${formVariants.length>1?`<button class="btn-icon danger" onclick="removeVariant(${vi})">${ICO.trash}</button>`:''}
          </div>
          <div class="color-picker-grid">${colorGrid}</div>
          ${v.color?`<div style="font-size:11px;color:var(--text-mid);margin-bottom:4px">Selected: <strong>${esc(v.color)}</strong></div>`:''}
          <div class="form-group" style="margin-bottom:0"><label>Sizes</label><div class="size-checkboxes">${sizeChecks}</div></div>
          <div class="soldout-toggle">
            <div class="toggle-switch${v.soldOut?' active':''}" onclick="formVariants[${vi}].soldOut=!formVariants[${vi}].soldOut;render()"></div>
            <span>${v.soldOut?'Sold Out':'In Stock'}</span>
          </div>
        </div>
      </div></div>`;
    });

    html += `</div><div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDressModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDress()">${editingIndex!==null?'Save Changes':'Add Dress'}</button>
    </div></div></div>`;
  }

  // ── Color Modal ──
  if (showColorModal) {
    let colorRows = editColors.map((c,ci) => `
      <div class="color-manager-row">
        <div class="color-manager-swatch" style="background:${c.hex}"><input type="color" value="${c.hex}" onchange="editColors[${ci}].hex=this.value;render()"></div>
        <input class="color-manager-name" id="cname-${ci}" value="${esc(c.name)}" oninput="editColors[${ci}].name=this.value">
        <button class="btn-icon danger" onclick="editColors.splice(${ci},1);render()">${ICO.trash}</button>
      </div>`).join('');

    html += `<div class="modal-overlay" onclick="showColorModal=false;render()"><div class="modal" style="max-width:500px" onclick="event.stopPropagation()">
      <div class="modal-header"><h2>Manage Colors</h2><button class="btn-icon" onclick="showColorModal=false;render()">${ICO.close}</button></div>
      <div class="modal-body">
        <p style="font-size:12px;color:var(--text-light);margin-bottom:12px">Add, edit, or remove colors. Tap the circle to change shade.</p>
        <div class="color-manager-list">${colorRows}</div>
        <div class="add-color-row">
          <div class="color-manager-swatch" style="background:${newColorHex}"><input type="color" value="${newColorHex}" onchange="newColorHex=this.value;render()"></div>
          <input type="text" id="new-color-name" value="${esc(newColorName)}" placeholder="New color name..." oninput="newColorName=this.value" onkeydown="if(event.key==='Enter')addColor()">
          <button class="btn btn-primary btn-small" onclick="addColor()">${ICO.plus} Add</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="showColorModal=false;render()">Cancel</button>
        <button class="btn btn-primary" onclick="saveColorChanges()">Save Colors</button>
      </div>
    </div></div>`;
  }

  // ── Image Preview ──
  if (previewImage) {
    html += `<div class="image-preview-overlay" onclick="previewImage=null;render()"><img src="${previewImage}"></div>`;
  }

  document.getElementById('app').innerHTML = html;

  // Restore scroll positions after re-render
  window.scrollTo(0, pageScrollY);
  const newModalBody = document.querySelector('.modal-body');
  if (newModalBody) newModalBody.scrollTop = modalScrollY;
  // Restore focus and cursor position
  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (activeSel !== null && el.setSelectionRange) {
        try { el.setSelectionRange(activeSel, activeSel); } catch(e) {}
      }
    }
  }
}

// ── Actions ──
function toggleCard(key) { expandedCards[key] = !expandedCards[key]; render(); }

function openAddModal() {
  editingIndex = null; formId=''; formName=''; formPrice='';
  formVariants = [newVariant()]; showDressModal = true; render();
}
function openEditModal(idx) {
  const d = dresses[idx]; editingIndex = idx;
  formId = d.id; formName = d.name||''; formPrice = String(d.price);
  formVariants = d.variants.map(v => ({...v}));
  showDressModal = true; render();
}
function closeDressModal() { showDressModal = false; render(); }

function saveDress() {
  if (!formId.trim() || !formPrice.trim()) return;
  const dress = {
    id: formId.trim(), name: formName.trim(), price: parseFloat(formPrice),
    variants: formVariants.map(v => ({...v, color: v.color.trim()})),
    createdAt: editingIndex !== null ? dresses[editingIndex].createdAt : Date.now()
  };
  if (editingIndex !== null) { dresses[editingIndex] = dress; }
  else { dresses.unshift(dress); expandedCards[dress.id + dress.createdAt] = true; }
  save(); showDressModal = false; render();
  showToast(editingIndex !== null ? 'Dress updated!' : 'Dress added!');
}

function deleteDress(idx) {
  if (confirm('Delete this dress?')) { dresses.splice(idx,1); save(); render(); showToast('Deleted'); }
}

function selectColor(vi, ci) {
  formVariants[vi].color = colors[ci].name;
  formVariants[vi].colorHex = colors[ci].hex;
  render();
}
function toggleSize(vi, size) {
  const arr = (formVariants[vi].sizes||'').split(',').map(s=>s.trim()).filter(Boolean);
  if (arr.includes(size)) formVariants[vi].sizes = arr.filter(s=>s!==size).join(',');
  else formVariants[vi].sizes = [...arr,size].sort((a,b)=>+a-+b).join(',');
  render();
}
function removeVariant(vi) { if (formVariants.length<=1) return; formVariants.splice(vi,1); render(); }

function showPreview(imgLen) {
  // Find the image from the currently expanded card variants
  const filtered = getFiltered();
  for (const d of filtered) {
    for (const v of d.variants) {
      if (v.image && String(v.image.length) === imgLen) {
        previewImage = v.image;
        render();
        return;
      }
    }
  }
}

// Color manager
function openColorModal() { editColors = colors.map(c=>({...c})); newColorName=''; newColorHex='#C4956A'; showColorModal=true; render(); }
function addColor() {
  if (!newColorName.trim()) return;
  editColors.push({name:newColorName.trim(),hex:newColorHex});
  newColorName=''; newColorHex='#C4956A'; render();
}
function saveColorChanges() {
  colors = editColors.filter(c=>c.name.trim());
  save(); showColorModal=false; render(); showToast('Colors saved!');
}

// Fix image preview for variant cards
document.addEventListener('click', (e) => {
  const box = e.target.closest('.variant-image-box');
  if (box && !showDressModal) {
    const img = box.querySelector('img');
    if (img && img.src) { previewImage = img.src; render(); }
  }
});

// Initial render
render();
</script>
</body>
</html>
